<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperPick — Place in Tote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:       #1a1a1a;
    --bg-panel:      #222222;
    --bg-card:       #2a2a2a;
    --bg-header:     #161616;
    --orange:        #e8890a;
    --orange-dim:    #3a2200;
    --teal:          #0abfbf;
    --teal-dim:      #032a2a;
    --text-primary:  #e8e8e8;
    --text-dim:      #aaaaaa;
    --text-muted:    #666666;
    --border:        #3a3a3a;
    --border-bright: #555555;
    --red:           #d94040;
    --font-mono:     'Share Tech Mono', monospace;
    --font-ui:       'Barlow Condensed', sans-serif;
    --font-body:     'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .top-nav {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .top-nav .logo {
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--text-primary);
    text-transform: uppercase;
  }
  .top-nav .logo span { color: var(--orange); }
  .top-nav .session-info {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }

  .main {
    display: flex;
    flex: 1;
    align-items: stretch;
  }

  .handset-col {
    width: 360px;
    min-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    background: var(--bg-dark);
    border-right: 1px solid var(--border);
    min-height: 100vh;
  }

  .handset-device {
    width: 280px;
    min-height: 510px;
    background: #1a1a1a;
    border-radius: 36px;
    padding: 14px;
    padding-bottom: 40px;
    box-shadow:
      0 0 0 1px #333,
      0 0 0 3px #111,
      0 8px 40px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .handset-device::before {
    content: '';
    position: absolute;
    left: -5px; top: 80px;
    width: 5px; height: 30px;
    background: #222;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 40px 0 #222;
  }
  .handset-device::after {
    content: '';
    position: absolute;
    right: -5px; top: 90px;
    width: 5px; height: 45px;
    background: #222;
    border-radius: 0 3px 3px 0;
  }

  .zebra-bar {
    text-align: center;
    padding: 6px 0 8px;
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    border-bottom: 1px solid #222;
    margin-bottom: 4px;
  }
  .zebra-bar::before { content: '≋ '; color: #444; }

  .handset-screen {
    background: var(--bg-panel);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #0a0a0a;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── Screen header ── */
  .screen-header {
    background: var(--bg-panel);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .back-btn { font-size: 16px; color: var(--text-dim); cursor: pointer; line-height: 1; }
  .pick-info { text-align: center; flex: 1; }
  .pick-id { font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-primary); }
  .picker-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
  .pick-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-top: 1px; }
  .menu-btn { font-size: 14px; color: var(--text-dim); cursor: pointer; }

  /* ── Title ── */
  .screen-title {
    text-align: center;
    padding: 12px 8px 10px;
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: 0.5px;
  }

  /* ── Item row box ── */
  .item-row-box {
    margin: 0 8px 8px 8px;
    padding: 10px 12px;
    border: 1px solid var(--border-bright);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .item-row-name {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
    flex: 1;
  }
  .item-row-qty {
    font-family: var(--font-mono);
    font-size: 20px;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  /* ── Tote info box ── */
  .tote-info-box {
    margin: 0 8px 8px 8px;
    padding: 12px;
    border: 1px solid var(--border-bright);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .tote-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tote-row-label {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
    min-width: 36px;
  }
  .tote-badge {
    background: var(--orange);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    letter-spacing: 1px;
  }
  .tagged-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--border-bright);
    padding: 3px 8px;
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .tote-id-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tote-id-label {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
    min-width: 36px;
  }
  .tote-id-val {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-primary);
    letter-spacing: 1px;
  }

  /* ── Barcode scanner icon ── */
  .scan-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .barcode-icon {
    font-size: 36px;
    color: var(--text-muted);
    opacity: 0.6;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    padding: 0 8px 8px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .keyboard-btn {
    width: 40px;
    height: 40px;
    background: var(--orange);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: opacity 0.15s;
  }
  .keyboard-btn:hover { opacity: 0.85; }
  .home-btn {
    width: 32px;
    height: 32px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .home-btn:hover { color: var(--text-primary); }

    .aisle-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 16px;
  overflow-y: auto;
}
.aisle-header h2 {
  font-family: var(--font-ui);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.instruction {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-dim);
  padding: 10px 14px;
  background: var(--bg-card);
  border-left: 3px solid var(--orange);
}
.instruction strong { color: var(--orange); }
.totes-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.tote-tile {
  background: var(--bg-card);
  border: 2px solid var(--border-bright);
  border-radius: 8px;
  padding: 16px 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  user-select: none;
}
.tote-tile:hover { border-color: var(--orange); transform: translateY(-2px); }
.tote-tile:active { transform: translateY(0); }
.tote-tile.correct-tote {
  border-color: var(--orange);
  background: var(--orange-dim);
  animation: correctPulse 0.4s ease;
}
.tote-tile.wrong-tote {
  border-color: var(--red);
  background: var(--red-dim);
  animation: shake 0.35s ease;
}
.tote-icon { font-size: 28px; }
.tote-num {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--text-primary);
  font-weight: 700;
}
.tote-barcode {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--text-muted);
  letter-spacing: 1px;
}
.error-bar {
  display: none;
  padding: 7px 10px;
  background: var(--red);
  text-align: center;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 999;
}
.error-bar.visible { display: block; }
.error-bar .error-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
}
@keyframes correctPulse {
  0%   { box-shadow: 0 0 0 0 rgba(232,137,10,0.6); }
  50%  { box-shadow: 0 0 0 12px rgba(232,137,10,0); }
  100% { box-shadow: 0 0 0 0 rgba(232,137,10,0); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="logo">Hyper<span>Pick</span></div>
  <div class="session-info">SESSION PICKING-006</div>
</nav>

<div class="main">
  <div class="handset-col">
    <div class="handset-device">
      <div class="zebra-bar">ZEBRA TC57</div>
      <div class="handset-screen">

        <!-- Header -->
        <div class="screen-header">
          <div class="back-btn">←</div>
          <div class="pick-info">
            <div class="pick-id">PICKING - 006</div>
            <div class="picker-name">ANDRAS</div>
            <div class="pick-time" id="h-time">04:25:16 03/04/2026</div>
          </div>
          <div class="menu-btn">☰</div>
        </div>

        <!-- Title -->
        <div class="screen-title" id="screen-title">Place in tote &amp; scan tote</div>

        <!-- Item row -->
        <div class="item-row-box">
          <div class="item-row-name" id="item-name">Gillette Fusion Razor Blades Refill x11</div>
          <div class="item-row-qty" id="item-qty">1</div>
        </div>

        <!-- Tote info -->
        <div class="tote-info-box">
          <div class="tote-row">
            <span class="tote-row-label">Tote:</span>
            <span class="tote-badge" id="tote-badge">F1</span>
            <div class="tagged-badge">🔒 Tagged</div>
          </div>
          <div class="tote-id-row">
            <span class="tote-id-label">ID:</span>
            <span class="tote-id-val" id="tote-id">JS131776</span>
          </div>
        </div>

        <!-- Scan area -->
        <div class="scan-area">
          <div class="barcode-icon">⬛▌▌▌▌▌⬛</div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
          <button class="keyboard-btn" title="Keyboard">⌨️</button>
        </div>
    </div>
  </div>
  </div>

    <div class="aisle-col">
  <div>
    <h2>Select Tote</h2>
    <div class="instruction">
      <strong>Scan the correct tote</strong> — click the tote that matches the handset
    </div>
    <div class="totes-grid" id="totes-grid"></div>
  </div>
</div>

<div class="error-bar" id="error-bar">
  <div class="error-text" id="error-text">WRONG TOTE</div>
</div>
</div>

<script>
function fmt2(n) { return String(n).padStart(2, "0"); }
function updateClock() {
  const now = new Date();
  const t = `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}:${fmt2(now.getSeconds())}`;
  const d = `${fmt2(now.getDate())}/${fmt2(now.getMonth()+1)}/${now.getFullYear()}`;
  document.getElementById("h-time").textContent = `${t} ${d}`;
}

const params = new URLSearchParams(window.location.search);
if (params.get("item"))  document.getElementById("item-name").textContent  = params.get("item");
if (params.get("qty"))   document.getElementById("item-qty").textContent   = params.get("qty");
if (params.get("tote"))  document.getElementById("tote-badge").textContent = params.get("tote");
if (params.get("id"))    document.getElementById("tote-id").textContent    = params.get("id");

const TOTE_NAMES = ["B1","B2","B3","B4","F1","F2","F3","F4"];
const correctToteName = params.get("tote") || TOTE_NAMES[Math.floor(Math.random() * 8)];

const totes = TOTE_NAMES.map(name => ({
  name,
  barcode: "T" + String(Math.floor(Math.random()*90000)+10000)
}));

const grid = document.getElementById("totes-grid");
totes.forEach(tote => {
  const tile = document.createElement("div");
  tile.className = "tote-tile";
  tile.innerHTML = `
    <div class="tote-icon">📦</div>
    <div class="tote-num">${tote.name}</div>
    <div class="tote-barcode">${tote.barcode}</div>
  `;
  tile.addEventListener("click", () => handleToteClick(tile, tote.name));
  grid.appendChild(tile);
});

let errorTimer = null;
function showError(msg) {
  const bar = document.getElementById("error-bar");
  document.getElementById("error-text").textContent = msg;
  bar.classList.add("visible");
  if (errorTimer) clearTimeout(errorTimer);
  errorTimer = setTimeout(() => bar.classList.remove("visible"), 2000);
}

function handleToteClick(tile, name) {
  if (name === correctToteName) {
    tile.classList.add("correct-tote");
    setTimeout(() => { window.location.href = "picksim.html"; }, 500);
  } else {
    tile.classList.add("wrong-tote");
    setTimeout(() => tile.classList.remove("wrong-tote"), 400);
    showError("WRONG TOTE");
  }
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
