<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperPick — Confirm Quantity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:       #1a1a1a;
    --bg-panel:      #222222;
    --bg-card:       #2a2a2a;
    --bg-header:     #161616;
    --orange:        #e8890a;
    --orange-dim:    #3a2200;
    --teal:          #0abfbf;
    --teal-dim:      #032a2a;
    --text-primary:  #e8e8e8;
    --text-dim:      #aaaaaa;
    --text-muted:    #666666;
    --border:        #3a3a3a;
    --border-bright: #555555;
    --red:           #d94040;
    --font-mono:     'Share Tech Mono', monospace;
    --font-ui:       'Barlow Condensed', sans-serif;
    --font-body:     'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Top nav ── */
  .top-nav {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .top-nav .logo {
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--text-primary);
    text-transform: uppercase;
  }
  .top-nav .logo span { color: var(--orange); }
  .top-nav .session-info {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }

  .main {
    display: flex;
    flex: 1;
    align-items: stretch;
  }

  /* ── Handset column ── */
  .handset-col {
    width: 360px;
    min-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    background: var(--bg-dark);
    border-right: 1px solid var(--border);
    min-height: 100vh;
  }

  .handset-device {
    width: 280px;
    min-height: 510px;
    background: #1a1a1a;
    border-radius: 36px;
    padding: 14px;
    padding-bottom: 40px;
    box-shadow:
      0 0 0 1px #333,
      0 0 0 3px #111,
      0 8px 40px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .handset-device::before {
    content: '';
    position: absolute;
    left: -5px; top: 80px;
    width: 5px; height: 30px;
    background: #222;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 40px 0 #222;
  }
  .handset-device::after {
    content: '';
    position: absolute;
    right: -5px; top: 90px;
    width: 5px; height: 45px;
    background: #222;
    border-radius: 0 3px 3px 0;
  }

  .zebra-bar {
    text-align: center;
    padding: 6px 0 8px;
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    border-bottom: 1px solid #222;
    margin-bottom: 4px;
  }
  .zebra-bar::before { content: '≋ '; color: #444; }

  .handset-screen {
    background: var(--bg-panel);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #0a0a0a;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── Screen header ── */
  .screen-header {
    background: var(--bg-panel);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .back-btn { font-size: 16px; color: var(--text-dim); cursor: pointer; }
  .pick-info { text-align: center; flex: 1; }
  .pick-id { font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-primary); }
  .picker-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
  .pick-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); margin-top: 1px; }
  .menu-btn { font-size: 14px; color: var(--text-dim); cursor: pointer; }

  /* ── Confirm quantity title ── */
  .confirm-title {
    text-align: center;
    padding: 10px 8px 8px;
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text-primary);
  }

  /* ── Item name box ── */
  .item-name-box {
    margin: 0 8px 6px 8px;
    padding: 8px 10px;
    border: 1px solid var(--border-bright);
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  /* ── Quantity control box ── */
  .qty-control-box {
    margin: 0 8px 6px 8px;
    padding: 10px;
    border: 1px solid var(--border-bright);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .qty-control-label {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.5px;
  }
  .qty-control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 38px;
    height: 38px;
    border: 2px solid var(--orange);
    background: transparent;
    color: var(--text-primary);
    font-size: 22px;
    font-family: var(--font-mono);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    user-select: none;
  }
  .qty-btn:hover { background: var(--orange-dim); }
  .qty-btn:active { background: var(--orange); }
  .qty-btn.disabled {
    border-color: var(--border-bright);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .qty-btn.disabled:hover { background: transparent; }
  .qty-display {
    width: 38px;
    height: 38px;
    background: var(--border-bright);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--text-primary);
  }

  /* ── Tote / Divider info box ── */
  .tote-info-box {
    margin: 0 8px 6px 8px;
    padding: 10px;
    border: 1px solid var(--border-bright);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tote-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .tote-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tote-row-label {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-primary);
    min-width: 28px;
  }
  .tote-badge {
    background: var(--orange);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    letter-spacing: 1px;
  }
  .tote-id-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tote-id-label {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-dim);
    min-width: 28px;
  }
  .tote-id-val {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 1px;
  }
  .tote-divider {
    width: 1px;
    height: 40px;
    background: var(--border-bright);
  }

  /* ── Confirm button ── */
  .confirm-btn-row {
    margin-top: auto;
    padding: 0 8px 8px 8px;
    display: flex;
    gap: 0;
  }
  .confirm-btn {
    flex: 1;
    padding: 11px;
    background: var(--orange);
    border: none;
    color: #fff;
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
    text-align: center;
  }
  .confirm-btn:hover { opacity: 0.9; }
  .home-btn {
    width: 42px;
    background: var(--orange);
    border: none;
    border-left: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }
  .home-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="logo">Hyper<span>Pick</span></div>
  <div class="session-info">SESSION PICKING-006</div>
</nav>

<div class="main">
  <div class="handset-col">
    <div class="handset-device">
      <div class="zebra-bar">ZEBRA TC57</div>
      <div class="handset-screen">

        <!-- Header -->
        <div class="screen-header">
          <div class="back-btn">←</div>
          <div class="pick-info">
            <div class="pick-id">PICKING - 006</div>
            <div class="picker-name">ANDRAS</div>
            <div class="pick-time" id="h-time">05:02:44 03/04/2026</div>
          </div>
          <div class="menu-btn">☰</div>
        </div>

        <!-- Title -->
        <div class="confirm-title" id="confirm-title">Confirm quantity: 2</div>

        <!-- Item name -->
        <div class="item-name-box" id="item-name-box">
          LEON Korean GFC Chicken Nuggets 300g
        </div>

        <!-- Quantity control -->
        <div class="qty-control-box">
          <div class="qty-control-label">Quantity</div>
          <div class="qty-control-row">
            <button class="qty-btn" id="btn-minus" onclick="changeQty(-1)">−</button>
            <div class="qty-display" id="qty-display">2</div>
            <button class="qty-btn" id="btn-plus" onclick="changeQty(1)">+</button>
          </div>
        </div>

        <!-- Tote / Divider info -->
        <div class="tote-info-box">
          <div class="tote-group">
            <div class="tote-row">
              <span class="tote-row-label">Tote:</span>
              <span class="tote-badge">B3</span>
            </div>
            <div class="tote-id-row">
              <span class="tote-id-label">ID:</span>
              <span class="tote-id-val">F0001452</span>
            </div>
          </div>
          <div class="tote-divider"></div>
          <div class="tote-group">
            <div class="tote-row">
              <span class="tote-row-label">Divider</span>
              <span class="tote-badge">0</span>
            </div>
            <div class="tote-id-row">
              <span class="tote-id-label">ID:</span>
              <span class="tote-id-val">E0001452</span>
            </div>
          </div>
        </div>

        <!-- Confirm button -->
        <div class="confirm-btn-row">
          <button class="confirm-btn" onclick="confirmQty()">Confirm</button>
          <button class="home-btn" title="Home">🏠</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const MAX_QTY = parseInt(params.get("qty")) || 2;
let currentQty = MAX_QTY;
document.getElementById("item-name-box").textContent = params.get("item") || "Unknown Item";
document.getElementById("confirm-title").textContent = `Confirm quantity: ${currentQty}`;
// also update tote badge if passed
const tote = params.get("tote");
if (tote) document.querySelector(".tote-badge").textContent = tote;

function fmt2(n) { return String(n).padStart(2, "0"); }
function updateClock() {
  const now = new Date();
  const t = `${fmt2(now.getHours())}:${fmt2(now.getMinutes())}:${fmt2(now.getSeconds())}`;
  const d = `${fmt2(now.getDate())}/${fmt2(now.getMonth()+1)}/${now.getFullYear()}`;
  document.getElementById("h-time").textContent = `${t} ${d}`;
}

function changeQty(delta) {
  const next = currentQty + delta;
  if (next < 1 || next > MAX_QTY) return;
  currentQty = next;
  document.getElementById("qty-display").textContent = currentQty;
  document.getElementById("confirm-title").textContent = `Confirm quantity: ${currentQty}`;
  // Update button disabled states
  document.getElementById("btn-minus").classList.toggle("disabled", currentQty <= 1);
  document.getElementById("btn-plus").classList.toggle("disabled", currentQty >= MAX_QTY);
}

function confirmQty() {
  const params = new URLSearchParams(window.location.search);
  const tote = params.get("tote") || "01";
  window.location.href = `tote.html?item=${encodeURIComponent(params.get("item"))}&qty=${currentQty}&tote=${tote}&id=T${String(Math.floor(Math.random()*90000)+10000)}`;
}

setInterval(updateClock, 1000);
updateClock();
// Set initial button states
changeQty(0);
</script>
</body>
</html>
